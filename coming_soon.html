<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.7.0/animate.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/shishirraven/animate-on-scroll@v1.2/animation_utility.css">
    <link rel="icon" type="image/x-icon" href="image/logo.png">
    <title>Codexa - Coming Soon</title>
</head>

<body>

    <main>
        <div class="section animated-gradient coming" style="height: 100vh;">
            <div class="r-container d-flex flex-column gap-3 h-100">
                <div
                    class="d-flex flex-column gap-3 align-items-center justify-content-center mx-auto text-center h-100">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb scrollanimation animated fadeInUp adr-5">
                            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Coming Soon</li>
                        </ol>
                    </nav>
                    <h3 class="scrollanimation animated fadeInUp adr-5 adl-2">Something Exciting is <span
                            class="accent-color-5">Coming Soon</span></h3>
                    <p class="scrollanimation animated fadeInUp adr-5 adl-4">
                        Get ready for a faster, smarter, and more collaborative development experience..</p>
                    <div class="countdown">
                        <div class="countdown-box">
                            <h2 id="days">10</h2>
                            <p>Days</p>
                        </div>
                        <div class="countdown-box">
                            <h2 id="hours">20</h2>
                            <p>Hours</p>
                        </div>
                        <div class="countdown-box">
                            <h2 id="minutes">59</h2>
                            <p>Minutes</p>
                        </div>
                        <div class="countdown-box">
                            <h2 id="seconds">30</h2>
                            <p>Seconds</p>
                        </div>
                    </div>
                    <div class="d-flex flex-column gap-3 mt-4 w-100">
                        <div class="toast-container position-fixed bottom-0 end-0 p-3">
                            <div id="liveToast" class="toast success_msg_subscribe bg-dark-transparent text-white"
                                role="alert" aria-live="assertive" aria-atomic="true">
                                <div class="d-flex">
                                    <div class="toast-body">
                                        Your Subscribe Send Successfully!.
                                    </div>
                                    <button type="button" class="btn me-2 m-auto text-white" data-bs-dismiss="toast"
                                        aria-label="Close">
                                        <i class="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div>
                            <form class="d-flex flex-column h-100 justify-content-center w-100 needs-validation form"
                                novalidate>
                                <input type="text" name="action" value="subscribe" hidden>
                                <div class="input-group gap-3 mb-xl-2 mb-0 position-relative custom-input-group">
                                    <input type="email" class="form-control subscribe custom-email-input"
                                        placeholder="Enter your email" name="email" required>
                                    <button class="btn btn-accent custom-submit-button submit_subscribe rounded-pill"
                                        style="width: max-content;" type="submit">
                                        <span>Subscribe</span>
                                    </button>
                                    <div class="invalid-feedback position-absolute bottom-0"
                                        style="margin-bottom: -2rem; margin-left: 1rem;">
                                        Please provide a valid email format (e.g., user@example.com).
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>


    <!-- Scripts -->
    <script src="js/vendor/jquery.min.js"></script>
    <script src="js/vendor/bootstrap.bundle.min.js"></script>
    <script src="js/vendor/swiper-bundle.min.js"></script>
    <script src="js/vendor/fontawesome/all.js"></script>
    <script src="js/vendor/fontawesome/all.min.js"></script>
    <script src="js/vendor/fontawesome/brands.js"></script>
    <script src="js/vendor/fontawesome/brands.min.js"></script>
    <script src="js/vendor/fontawesome/fontawesome.js"></script>
    <script src="js/vendor/fontawesome/fontawesome.min.js"></script>
    <script src="js/vendor/fontawesome/regular.js"></script>
    <script src="js/vendor/fontawesome/regular.min.js"></script>
    <script src="js/vendor/fontawesome/solid.js"></script>
    <script src="js/vendor/fontawesome/solid.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/swiper-script.js"></script>
    <script src="js/submit-form.js"></script>
    <script src="js/vendor/isotope.pkgd.min.js"></script>
    <script src="js/video_embedded.js"></script>
    <script src="js/vendor/fslightbox.js"></script>
    <script
        src="https://cdn.jsdelivr.net/gh/shishirraven/animate-on-scroll@v1.0/oyethemes_onscroll_animation.js"></script>
</body>

</html>
